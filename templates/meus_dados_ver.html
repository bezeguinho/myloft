{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0" style="border-radius: 10px; background-color: #ffffff;">
            <div class="card-body p-5">
                <div class="row align-items-center">

                    <div class="col-md-7 pe-md-5 border-end">
                        <div class="mb-4">
                            <label class="fw-bold text-muted small d-block">NOME:</label>
                            <p class="fs-5 fw-bold text-primary">{{ utilizador.nome }}</p>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold text-muted small d-block">LOCALIDADE:</label>
                            <p class="fs-5">{{ utilizador.localberry or '---' }}</p>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold text-muted small d-block">EMAIL:</label>
                            <p class="fs-5">{{ utilizador.email or '---' }}</p>
                        </div>
                        <div class="mb-4">
                            <label class="fw-bold text-muted small d-block">TELEMÓVEL:</label>
                            <p class="fs-5">{{ utilizador.telefone or '---' }}</p>
                        </div>
                    </div>

                    <div class="col-md-5 text-center">
                        <div class="mx-auto shadow-sm"
                            style="width: 220px; height: 220px; border-radius: 15px; border: 3px solid #0d6efd; overflow: hidden;">
                            {% if utilizador.foto %}
                            <img src="{{ url_for('static', filename=utilizador.foto) }}"
                                style="width: 100%; height: 100%; object-fit: cover;">
                            {% else %}
                            <div class="w-100 h-100 bg-light d-flex align-items-center justify-content-center">
                                <i class="bi bi-person-fill text-secondary" style="font-size: 6rem;"></i>
                            </div>
                            {% endif %}
                        </div>
                    </div>
                </div>

                <div class="mt-5 text-center">
                    <a href="{{ url_for('editar_dados') }}"
                        class="btn btn-primary btn-lg px-5 fw-bold shadow-sm custom-btn-hover"
                        style="border-radius: 8px;">
                        EDITAR DADOS
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-btn-hover:hover {
        background-color: #ffde00 !important;
        border-color: #ffde00 !important;
        color: #000000 !important;
    }
</style>
{% endblock %}
