{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 text-center p-4" style="border-radius: 15px;">
            {% if utilizador.foto %}
            <img src="{{ url_for('static', filename=utilizador.foto) }}" class="mx-auto shadow mb-3"
                style="width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 4px solid #0d6efd;">
            {% else %}
            <div class="mx-auto bg-light d-flex align-items-center justify-content-center mb-3 shadow-sm"
                style="width: 120px; height: 120px; border-radius: 50%;">
                <i class="bi bi-person text-secondary" style="font-size: 3rem;"></i>
            </div>
            {% endif %}

            <h2 class="fw-bold text-primary">{{ utilizador.nome }}</h2>
            <p class="text-muted mb-4"><i class="bi bi-geo-alt-fill me-1"></i>{{ utilizador.localberry or 'Localidade
                não definida' }}</p>

            <ul class="list-group list-group-flush text-start mb-4">
                <li class="list-group-item"><i class="bi bi-telephone-fill text-primary me-3"></i>{{ utilizador.telefone
                    or '---' }}</li>
                <li class="list-group-item"><i class="bi bi-envelope-at-fill text-primary me-3"></i>{{ utilizador.email
                    or '---' }}</li>
            </ul>

            <a href="{{ url_for('editar_dados') }}" class="btn btn-outline-primary fw-bold">
                <i class="bi bi-pencil-square me-2"></i>EDITAR PERFIL
            </a>
        </div>
    </div>
</div>
{% endblock %}
