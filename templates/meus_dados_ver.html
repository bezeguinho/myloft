{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-auto">
        <div class="card shadow border-0" style="border-radius: 10px; width: 400px; max-width: 100%;">
            <div class="card-body p-4 p-md-5 text-center">
                <h2 class="fw-bold text-primary mb-4 text-uppercase">Os Meus Dados</h2>

                <div class="mb-4 text-start">
                    <label class="form-label fw-bold small text-uppercase text-secondary">Nome / Pombal:</label>
                    <p class="fs-5 fw-bold text-dark border-bottom pb-2">
                        {{ utilizador.nome if utilizador else 'Não definido' }}
                    </p>
                </div>

                <div class="mt-4">
                    <a href="{{ url_for('index') }}" class="btn btn-retroceder btn-lg w-100 shadow">VOLTAR</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
