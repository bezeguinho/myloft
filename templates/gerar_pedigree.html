{% extends "base.html" %}
{% block content %}
<style>
    .btn-voltar {
        background-color: #ffcc29 !important;
        color: #000000 !important;
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: bold;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(251, 192, 45, 0.3);
    }

    .btn-voltar:hover {
        background-color: #ffcc29 !important;
        color: #ffffff !important;
        box-shadow: 0 8px 25px rgba(251, 192, 45, 0.4);
    }

    .btn-gerar {
        background-color: #0d6efd !important;
        color: #ffffff !important;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn-gerar:hover {
        background-color: #0d6efd !important;
        color: #000000 !important;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 p-5 mt-5"
            style="border-radius: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
            <h2 class="text-primary fw-bold mb-4 text-start">Gerar Pedigree</h2>

            <form action="{{ url_for('view_pedigree') }}" method="POST">
                <div class="mb-4 text-start">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="radio" name="geracoes" id="geracoes4" value="4" checked>
                        <label class="form-check-label fw-bold text-secondary" for="geracoes4">
                            4 Gerações
                        </label>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="radio" name="geracoes" id="geracoes5" value="5">
                        <label class="form-check-label fw-bold text-secondary" for="geracoes5">
                            5 Gerações
                        </label>
                    </div>

                    <label class="form-label fw-bold text-muted small ">Nº de Anilha / Nome</label>
                    <input list="pombosList" name="anilha" class="form-control form-control-lg border-2"
                        placeholder="Pesquisar pombo..." autocomplete="off" required autofocus
                        style="border-radius: 12px; padding: 15px;">
                    <datalist id="pombosList">
                        {% for p in pombos %}
                        <option value="{{ p.anilha }} - {{ p.nome or 'Sem Nome' }}"></option>
                        {% endfor %}
                    </datalist>
                </div>

                <div class="d-flex flex-column gap-3">
                    <button type="submit" class="btn btn-gerar btn-lg w-100 p-3 shadow-sm">
                        <i class="bi bi-file-earmark-pdf-fill me-2"></i> Gerar Documento
                    </button>
                    <a href="{{ url_for('index') }}" class="btn btn-voltar btn-lg w-100 p-3 shadow-sm">
                        <i class="bi bi-arrow-left me-2"></i> Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
