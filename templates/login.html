{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h2 class="text-center mb-4">Iniciar Sessão</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">Esqueci-me da password</a>
        </div>
        <hr>
        <div class="text-center">
            <p>Ainda não tem conta? <a href="{{ url_for('register') }}" class="text-decoration-none">Criar Conta</a></p>
        </div>
    </div>
</div>
{% endblock %}
