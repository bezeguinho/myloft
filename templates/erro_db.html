{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <div class="card border-0 shadow-lg rounded-4 p-5">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger display-1"></i>
            </div>
            <h1 class="fw-bold text-dark mb-4">Erro de Ligação à Base de Dados</h1>
            <p class="text-muted fs-5 mb-5">Não foi possível estabelecer ligação com a base de dados. Isto pode ser devido a manutenção ou configurações incorretas.</p>
            
            <div class="bg-light p-4 rounded-3 mb-5 text-start border">
                <p class="fw-bold text-uppercase small text-muted mb-2">Detalhes técnicos:</p>
                <code class="text-danger small">{{ erro }}</code>
            </div>

            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg rounded-pill px-5">Tentar Novamente</a>
                <a href="javascript:location.reload()" class="btn btn-outline-secondary btn-lg rounded-pill px-5">Recarregar Página</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
