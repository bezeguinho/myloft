{% extends "base.html" %}
{% block content %}

<style>
    /* Estilo para tonificar as caixas e suavizar as ajudas */
    .caixa-input {
        border: 1px solid #888888 !important;
        /* Borda mais escura e visível */
        background-color: #fdfdfd !important;
    }

    .caixa-input:focus {
        border-color: var(--azul-myloft) !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }

    /* Tornar os placeholders cinzentos e discretos */
    .caixa-input::placeholder {
        color: #b0b0b0 !important;
        font-weight: normal;
    }
</style>

<div class="row justify-content-center">
    <div class="col-md-11">
        <div class="card shadow border-0" style="border-radius: 10px; background-color: #ffffff;">
            <div class="card-body p-4">
                <h2 class="fw-bold text-primary mb-4 text-uppercase">Inserir Novo Pombo</h2>
                <form method="POST" id="pomboForm">

                    <div class="row g-3 mb-3">
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Nº da Anilha:</label>
                            <input type="text" name="anilha" class="form-control caixa-input" maxlength="12"
                                style="width: 150px;" required placeholder="Ex: 1234567">
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Ano:</label>
                            <select name="ano" id="pomboAno" class="form-select caixa-input" style="width: 120px;"
                                required onchange="filtrarPais()">
                                <option value="" selected disabled hidden>Escolha...</option>
                                {% for ano in anos_lista %}
                                <option value="{{ ano }}">{{ ano }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Nome do Pombo:</label>
                            <input type="text" name="nome" class="form-control caixa-input" maxlength="40"
                                style="width: 250px;" placeholder="Nome...">
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Cor:</label>
                            <input type="text" name="cor" class="form-control caixa-input" maxlength="40"
                                style="width: 180px;" placeholder="Cor...">
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Nº do Pai:</label>
                            <input type="text" name="pai" id="paiInput" class="form-control caixa-input" maxlength="12"
                                style="width: 150px;" list="listaPais" placeholder="Anilha Pai...">
                            <datalist id="listaPais"></datalist>
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Nº da Mãe:</label>
                            <input type="text" name="mae" id="maeInput" class="form-control caixa-input" maxlength="12"
                                style="width: 150px;" list="listaMaes" placeholder="Anilha Mãe...">
                            <datalist id="listaMaes"></datalist>
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Sexo:</label>
                            <select name="sexo" class="form-select caixa-input" style="width: 150px;" required>
                                <option value="" selected disabled hidden>Escolha...</option>
                                <option value="Macho">Macho</option>
                                <option value="Fêmea">Fêmea</option>
                                <option value="Indefinido">Indefinido</option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">Categoria:</label>
                            <select name="categoria" id="categoriaSelect" class="form-select caixa-input"
                                style="width: 160px;" required onchange="toggleCedido()">
                                <option value="" selected disabled hidden>Escolha...</option>
                                <option value="Voador">Voadores</option>
                                <option value="Reprodutor">Reprodutores</option>
                                <option value="Cedido">Cedido</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3" id="cedidoGroup" style="display: none;">
                        <div class="col-auto">
                            <label class="form-label fw-bold small text-uppercase">A quem cedeu:</label>
                            <input type="text" name="cedido_a" class="form-control caixa-input" style="width: 300px;"
                                placeholder="Nome da pessoa a quem cedeu...">
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-auto d-flex align-items-center gap-4">
                            <div>
                                <label class="form-label fw-bold small text-uppercase">Descrição para o
                                    pedigre...</label>
                                <textarea name="obs" class="form-control caixa-input"
                                    style="width: 250px; height: 250px; resize: none; overflow: hidden; line-height: 1.15;"
                                    maxlength="350" placeholder="Insira a descrição aqui..."></textarea>
                            </div>
                            <div class="d-flex flex-column justify-content-center gap-3 pt-4" style="width: 200px;">
                                <button type="submit" class="btn btn-executar btn-lg w-100 shadow">GRAVAR POMBO</button>
                                <a href="{{ url_for('lista_pombos') }}"
                                    class="btn btn-retroceder btn-lg w-100 shadow">VOLTAR</a>
                            </div>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const todosPombos = [
        {% for p in pombos_user %}
    { anilha: "{{ p.anilha }}", ano: { { p.ano or 0 } }, sexo: "{{ p.sexo }}" },
    {% endfor %}
];

    function filtrarPais() {
        const anoSel = parseInt(document.getElementById('pomboAno').value);
        const dPai = document.getElementById('listaPais');
        const dMae = document.getElementById('listaMaes');
        dPai.innerHTML = ""; dMae.innerHTML = "";

        if (!isNaN(anoSel)) {
            todosPombos.forEach(p => {
                if (p.ano <= anoSel) {
                    let opt = document.createElement('option');
                    opt.value = p.anilha;
                    if (p.sexo === "Macho") dPai.appendChild(opt);
                    else if (p.sexo === "Fêmea") dMae.appendChild(opt);
                    else { dPai.appendChild(opt.cloneNode(true)); dMae.appendChild(opt.cloneNode(true)); }
                }
            });
        }
    }

    function toggleCedido() {
        const sel = document.getElementById("categoriaSelect");
        const div = document.getElementById("cedidoGroup");
        div.style.display = (sel.value === "Cedido") ? "block" : "none";
    }
</script>
{% endblock %}
