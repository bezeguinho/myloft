{% extends "base.html" %}
{% block content %}
<style>
    .caixa-input {
        border: 1px solid #777777 !important;
        background-color: #fdfdfd !important;
        color: #000000 !important;
    }

    .caixa-input:focus {
        border-color: var(--azul-myloft) !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }

    /* Mais Escuro e Forte para se ver bem o cinzento */
    ::placeholder {
        color: #888888 !important;
        font-weight: 500 !important;
        opacity: 1;
    }

    /* Classe especial para o select do Ano ficar cinzento quando sugerido */
    .select-sugerido {
        color: #888888 !important;
        font-weight: 500 !important;
    }

    @media (min-width: 768px) {
        .w-md-140 {
            width: 140px !important;
        }

        .w-md-110 {
            width: 110px !important;
        }

        .w-md-150 {
            width: 150px !important;
        }

        .w-md-250 {
            width: 250px !important;
        }

        .w-md-300 {
            width: 300px !important;
        }

        .caixa-botoes {
            width: 200px;
        }
    }

    @media (max-width: 767px) {
        .caixa-input {
            width: 100% !important;
        }

        .caixa-botoes {
            width: 100% !important;
            margin-top: 20px;
        }
    }
</style>

<div class="row justify-content-center">
    <div class="col-12 col-lg-auto">
        <div class="card shadow border-0" style="border-radius: 10px;">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-primary mb-4 text-uppercase">
                    {% if modo_edicao %}Editar Pombo: {{ pombo.anilha }}{% else %}Inserir Novo Pombo{% endif %}
                </h2>

                <form method="POST" onsubmit="return assumirSugestoes()">

                    <div class="row g-3 mb-4 text-uppercase fw-bold small">
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº ANILHA</label>
                            <input type="text" name="anilha" id="inputAnilha" class="form-control caixa-input w-md-140"
                                placeholder="{{ proxima_anilha }}" {% if not proxima_anilha and not modo_edicao
                                %}required{% endif %} value="{{ pombo.anilha if modo_edicao else '' }}" autofocus>
                            <input type="hidden" name="anilha_sugerida" value="{{ proxima_anilha }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">ANO</label>

                            <select name="ano" id="inputAno"
                                class="form-select caixa-input w-md-110 {% if ultimo_ano and not modo_edicao %}select-sugerido{% endif %}"
                                onchange="this.classList.remove('select-sugerido')" {% if not ultimo_ano and not
                                modo_edicao %}required{% endif %}>

                                {% if ultimo_ano and not modo_edicao %}
                                <option value="" selected hidden>Sugere: {{ ultimo_ano }}</option>
                                {% else %}
                                <option value="" {% if not modo_edicao %}selected{% endif %} disabled hidden>Escolha..
                                </option>
                                {% endif %}

                                {% for ano in anos_lista %}
                                <option value="{{ ano }}" {% if modo_edicao and pombo.ano==ano %}selected{% endif %}
                                    style="color: #000;">{{ ano }}</option>
                                {% endfor %}
                            </select>
                            <input type="hidden" name="ano_sugerido" value="{{ ultimo_ano }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">NOME</label>
                            <input type="text" name="nome" class="form-control caixa-input w-md-250" maxlength="24"
                                value="{{ pombo.nome if modo_edicao else '' }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">COR</label>
                            <input type="text" name="cor" class="form-control caixa-input w-md-250" maxlength="24"
                                value="{{ pombo.cor if modo_edicao else '' }}">
                        </div>
                    </div>

                    <div class="row g-3 mb-4 text-uppercase fw-bold small align-items-start">
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº PAI</label>
                            <input type="text" name="pai" class="form-control caixa-input w-md-140"
                                value="{{ pombo.pai if modo_edicao else '' }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº MÃE</label>
                            <input type="text" name="mae" class="form-control caixa-input w-md-140"
                                value="{{ pombo.mae if modo_edicao else '' }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">SEXO</label>
                            <select name="sexo" class="form-select caixa-input w-md-140" required>
                                <option value="" {% if not modo_edicao %}selected{% endif %} disabled hidden>Escolha..
                                </option>
                                <option value="Macho" {% if modo_edicao and pombo.sexo=='Macho' %}selected{% endif %}>
                                    Macho</option>
                                <option value="Fêmea" {% if modo_edicao and pombo.sexo=='Fêmea' %}selected{% endif %}>
                                    Fêmea</option>
                                <option value="Indefinido" {% if modo_edicao and pombo.sexo=='Indefinido' %}selected{%
                                    endif %}>Indefinido</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">CATEGORIA</label>
                            <select name="categoria" id="categoriaSelect" class="form-select caixa-input w-md-150"
                                required onchange="verificarCategoria()">
                                <option value="" {% if not modo_edicao %}selected{% endif %} disabled hidden>Escolha..
                                </option>
                                <option value="Voador" {% if modo_edicao and pombo.categoria=='Voador' %}selected{%
                                    endif %}>Voadores</option>
                                <option value="Reprodutor" {% if modo_edicao and pombo.categoria=='Reprodutor'
                                    %}selected{% endif %}>Reprodutores</option>
                                <option value="Cedido" {% if modo_edicao and pombo.categoria=='Cedido' %}selected{%
                                    endif %}>Cedido</option>
                            </select>

                            <div id="caixaCedidoA"
                                class="mt-3 {% if not (modo_edicao and pombo.categoria == 'Cedido') %}d-none{% endif %}">
                                <label class="form-label fw-bold" style="color: #000;">CEDIDO A:</label>
                                <input type="text" name="cedido_a" id="inputCedidoA" maxlength="40"
                                    class="form-control caixa-input w-md-300"
                                    value="{{ pombo.cedido_a if modo_edicao else '' }}">
                            </div>
                        </div>

                        <div class="col-12 col-md-auto pt-md-4">
                            <div class="d-flex align-items-center bg-light p-2 rounded border shadow-sm mt-3 mt-md-0">
                                <label class="form-check-label me-3" for="checkOculto">OCULTAR POMBO?</label>
                                <input class="form-check-input border-secondary" type="checkbox" name="oculto"
                                    id="checkOculto" style="transform: scale(1.3);" {% if modo_edicao and pombo.oculto
                                    %}checked{% endif %}>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-12 col-md-auto">
                            <label class="form-label fw-bold small text-uppercase">Descrição para o Pedigree...</label>
                            <textarea name="obs" class="form-control caixa-input w-md-250"
                                style="height: 250px; resize: none; overflow: hidden;"
                                maxlength="400">{{ pombo.obs if modo_edicao else '' }}</textarea>
                        </div>

                        <div
                            class="col-12 col-md-auto d-flex flex-column justify-content-start gap-3 pt-md-4 caixa-botoes">
                            <button type="submit" class="btn btn-executar btn-lg shadow w-100">
                                {% if modo_edicao %}ATUALIZAR{% else %}GRAVAR{% endif %}
                            </button>
                            <a href="{{ url_for('lista_pombos') }}" class="btn btn-retroceder btn-lg shadow w-100">SAIR
                                (LISTA)</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function verificarCategoria() {
        var dropdown = document.getElementById("categoriaSelect");
        var caixa = document.getElementById("caixaCedidoA");
        var input = document.getElementById("inputCedidoA");

        if (dropdown.value === "Cedido") {
            caixa.classList.remove("d-none");
            caixa.style.display = "block";
            setTimeout(function () { input.focus(); }, 50);
        } else {
            caixa.classList.add("d-none");
            caixa.style.display = "none";
            input.value = "";
        }
    }

    function assumirSugestoes() {
        // Assume Anilha se vazia
        var anilhaInput = document.getElementById("inputAnilha");
        if (anilhaInput.value.trim() === "" && anilhaInput.placeholder !== "") {
            anilhaInput.value = anilhaInput.placeholder;
        }
        return true; // O backend trata do Ano Sugerido automaticamente!
    }
</script>
{% endblock %}
