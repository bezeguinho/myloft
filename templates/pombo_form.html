{% extends "base.html" %}
{% block content %}

<style>
    /* Padrões de botões e hovers */
    .btn-gravar {
        background-color: #0d6efd !important;
        color: white !important;
        transition: 0.3s;
        border: none;
    }

    .btn-gravar:hover {
        color: black !important;
    }

    .btn-voltar {
        background-color: #ffc107 !important;
        color: black !important;
        transition: 0.3s;
        border: none;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-voltar:hover {
        color: white !important;
    }

    #linha_cedido {
        display: none;
        margin-top: 5px;
    }
</style>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
            <div class="card shadow border-0" style="border-radius: 10px;">
                <div class="card-body p-4 p-md-5">

                    <h2 class="fw-bold text-primary mb-4 text-uppercase text-center">
                        {% if pombo %}
                        Editar Pombo: {{ pombo.anilha }}
                        {% else %}
                        Inserir Novo Pombo
                        {% endif %}
                    </h2>

                    <form method="POST">
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label class="fw-bold text-uppercase small">Nº Anilha</label>
                                <input type="text" name="anilha" class="form-control" maxlength="12"
                                    value="{{ pombo.anilha if pombo else '' }}" {% if pombo %}readonly
                                    style="background-color: #eee;" {% endif %} required>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label class="fw-bold text-uppercase small">Ano</label>
                                <select name="ano" class="form-select" id="ano_select" required>
                                    <option value="" disabled hidden {% if not pombo %}selected{% endif %}>Escolha..
                                    </option>
                                    {% for a in anos_lista %}
                                    <option value="{{ a }}" {% if pombo and pombo.ano==a %}selected{% endif %}>{{ a }}
                                    </option>
                                    {% endfor %}
                                </select>
                                {% if pombo %}
                                <input type="hidden" name="ano" value="{{ pombo.ano }}">
                                {% endif %}
                            </div>
                            <div class="col mb-3">
                                <label class="fw-bold text-uppercase small">Nome</label>
                                <input type="text" name="nome" class="form-control" maxlength="24"
                                    value="{{ pombo.nome if pombo else '' }}">
                            </div>
                            <div class="col mb-3">
                                <label class="fw-bold text-uppercase small">Cor</label>
                                <input type="text" name="cor" class="form-control" maxlength="24"
                                    value="{{ pombo.cor if pombo else '' }}">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold text-uppercase small">Pai</label>
                                <select name="pai_id" id="pai_id" class="form-select">
                                    <option value="">-- Selecione o Pai --</option>
                                    {% for m in machos %}
                                    <option value="{{ m.id }}" data-ano="{{ m.ano }}" {% if pombo and pombo.pai_id==m.id
                                        %}selected{% endif %}>{{ m.anilha }} ({{ m.ano }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold text-uppercase small">Mãe</label>
                                <select name="mae_id" id="mae_id" class="form-select">
                                    <option value="">-- Selecione a Mãe --</option>
                                    {% for f in femeas %}
                                    <option value="{{ f.id }}" data-ano="{{ f.ano }}" {% if pombo and pombo.mae_id==f.id
                                        %}selected{% endif %}>{{ f.anilha }} ({{ f.ano }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row align-items-end">
                            <div class="col-md-4 mb-3">
                                <label class="fw-bold text-uppercase small">Sexo</label>
                                <select name="sexo" class="form-select" required>
                                    <option value="" disabled hidden {% if not pombo %}selected{% endif %}>Escolha..
                                    </option>
                                    <option value="Macho" {% if pombo and pombo.sexo=='Macho' %}selected{% endif %}>
                                        Macho</option>
                                    <option value="Fêmea" {% if pombo and pombo.sexo=='Fêmea' %}selected{% endif %}>
                                        Fêmea</option>
                                    <option value="Indefinido" {% if pombo and pombo.sexo=='Indefinido' %}selected{%
                                        endif %}>Indefinido</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="fw-bold text-uppercase small">Categoria</label>
                                <select name="categoria" id="categoria_select" class="form-select" required>
                                    <option value="" disabled hidden {% if not pombo %}selected{% endif %}>Escolha..
                                    </option>
                                    <option value="Voador" {% if pombo and pombo.categoria=='Voador' %}selected{% endif
                                        %}>Voador</option>
                                    <option value="Reprodutor" {% if pombo and pombo.categoria=='Reprodutor'
                                        %}selected{% endif %}>Reprodutor</option>
                                    <option value="Cedido" {% if pombo and pombo.categoria=='Cedido' %}selected{% endif
                                        %}>Cedido</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <div class="d-flex align-items-center justify-content-between border rounded px-3 bg-light"
                                    style="height: 38px;">
                                    <label class="fw-bold mb-0 small" for="oculto">OCULTAR POMBO?</label>
                                    <input type="checkbox" name="oculto" id="oculto" class="form-check-input mt-0" {% if
                                        pombo and pombo.oculto %}checked{% endif %}>
                                </div>
                            </div>
                        </div>

                        <div class="row" id="linha_cedido">
                            <div class="col-md-4 mb-3 d-flex align-items-center justify-content-end">
                                <label class="fw-bold small mb-0 text-nowrap" style="color: black;">Cedido a:</label>
                            </div>
                            <div class="col-md-4 mb-3">
                                <input type="text" name="cedido_a" class="form-control"
                                    value="{{ pombo.cedido_a if pombo else '' }}">
                            </div>
                            <div class="col-md-4"></div>
                        </div>

                        <div class="row mt-2">
                            <div class="col-12 d-flex flex-wrap gap-3 align-items-start">

                                <div>
                                    <label class="fw-bold text-uppercase small">Descrição para o Pedigree...</label>
                                    <textarea name="obs" id="obs" class="form-control"
                                        style="width: 250px; height: 250px; resize: none; overflow: hidden;"
                                        maxlength="100"
                                        oninput="if(this.value.length > 100) this.value = this.value.substring(0, 100);">{{ pombo.obs if pombo else '' }}</textarea>

                                    <div class="text-muted mt-1 fw-bold"
                                        style="width: 250px; text-align: right; font-size: 0.8rem;">
                                        <span id="char_count">0</span> / 100 carateres
                                    </div>
                                </div>

                                <div style="width: 160px;">
                                    <label style="visibility: hidden;" class="small d-block mb-2">Espaço</label>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-gravar fw-bold py-2">GRAVAR</button>
                                        <a href="{{ url_for('lista_pombos') }}"
                                            class="btn btn-voltar fw-bold py-2">VOLTAR</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

<script>
    const selectCat = document.getElementById('categoria_select');
    const linhaCedido = document.getElementById('linha_cedido');

    function toggleCedido() {
        linhaCedido.style.display = (selectCat.value === 'Cedido') ? 'flex' : 'none';
    }

    selectCat.addEventListener('change', toggleCedido);
    window.onload = toggleCedido;

    // Filtro biológico: impede selecionar pais mais novos que o pombo
    document.getElementById('ano_select').addEventListener('change', function () {
        var anoFilho = parseInt(this.value);
        ['pai_id', 'mae_id'].forEach(function (id) {
            var select = document.getElementById(id);
            for (var i = 1; i < select.options.length; i++) {
                var anoP = parseInt(select.options[i].getAttribute('data-ano'));
                select.options[i].style.display = (anoFilho && anoP > anoFilho) ? 'none' : 'block';
            }
        });
    });
</script>

{% endblock %}
