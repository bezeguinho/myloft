{% extends "base.html" %}
{% block content %}
<style>
    .caixa-input {
        border: 1px solid #777777 !important;
        background-color: #fdfdfd !important;
        color: #000000 !important;
    }

    .caixa-input:focus {
        border-color: var(--azul-myloft) !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
    }

    ::placeholder {
        color: #b0b0b0 !important;
        font-weight: normal !important;
        opacity: 1;
    }

    @media (min-width: 768px) {
        .w-md-140 {
            width: 140px !important;
        }

        .w-md-110 {
            width: 110px !important;
        }

        .w-md-250 {
            width: 250px !important;
        }

        .w-md-150 {
            width: 150px !important;
        }

        .caixa-botoes {
            width: 200px;
        }
    }

    @media (max-width: 767px) {
        .caixa-input {
            width: 100% !important;
        }

        .caixa-botoes {
            width: 100% !important;
            margin-top: 20px;
        }
    }
</style>

<div class="row justify-content-center">
    <div class="col-12 col-lg-auto">
        <div class="card shadow border-0" style="border-radius: 10px;">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-primary mb-4 text-uppercase">Inserir Novo Pombo</h2>

                <form method="POST" onsubmit="return assumirAnilhaSugerida()">

                    <div class="row g-3 mb-4 text-uppercase fw-bold small">
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº ANILHA:</label>
                            <input type="text" name="anilha" id="inputAnilha" class="form-control caixa-input w-md-140"
                                placeholder="{{ proxima_anilha }}" {% if not proxima_anilha %}required{% endif %}
                                autofocus>
                            <input type="hidden" name="anilha_sugerida" value="{{ proxima_anilha }}">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">ANO:</label>
                            <select name="ano" class="form-select caixa-input w-md-110" required>
                                <option value="" selected disabled hidden>Escolha..</option>
                                {% for ano in anos_lista %}
                                <option value="{{ ano }}">{{ ano }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">NOME:</label>
                            <input type="text" name="nome" class="form-control caixa-input w-md-250" maxlength="24">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">COR:</label>
                            <input type="text" name="cor" class="form-control caixa-input w-md-250" maxlength="24">
                        </div>
                    </div>

                    <div class="row g-3 mb-4 text-uppercase fw-bold small align-items-start">
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº PAI:</label>
                            <input type="text" name="pai" class="form-control caixa-input w-md-140">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">Nº MÃE:</label>
                            <input type="text" name="mae" class="form-control caixa-input w-md-140">
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">SEXO:</label>
                            <select name="sexo" class="form-select caixa-input w-md-140" required>
                                <option value="" selected disabled hidden>Escolha..</option>
                                <option value="Macho">Macho</option>
                                <option value="Fêmea">Fêmea</option>
                                <option value="Indefinido">Indefinido</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-auto">
                            <label class="form-label">CATEGORIA:</label>
                            <select name="categoria" id="categoriaSelect" class="form-select caixa-input w-md-150"
                                required onchange="verificarCategoria()">
                                <option value="" selected disabled hidden>Escolha..</option>
                                <option value="Voador">Voadores</option>
                                <option value="Reprodutor">Reprodutores</option>
                                <option value="Cedido">Cedido</option>
                            </select>

                            <div id="caixaCedidoA" style="display: none; margin-top: 15px;">
                                <label class="form-label fw-bold" style="color: #000;">CEDIDO A:</label>
                                <input type="text" name="cedido_a" id="inputCedidoA"
                                    class="form-control caixa-input w-md-250">
                            </div>
                        </div>

                        <div class="col-12 col-md-auto pt-md-4">
                            <div class="d-flex align-items-center bg-light p-2 rounded border shadow-sm mt-3 mt-md-0">
                                <label class="form-check-label me-3" for="checkOculto">OCULTAR POMBO?</label>
                                <input class="form-check-input border-secondary" type="checkbox" name="oculto"
                                    id="checkOculto" style="transform: scale(1.3);">
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-12 col-md-auto">
                            <label class="form-label fw-bold small text-uppercase">Descrição para o Pedigree...</label>
                            <textarea name="obs" class="form-control caixa-input w-md-250"
                                style="height: 250px; resize: none; overflow: hidden;" maxlength="400"></textarea>
                        </div>

                        <div
                            class="col-12 col-md-auto d-flex flex-column justify-content-start gap-3 pt-md-4 caixa-botoes">
                            <button type="submit" class="btn btn-executar btn-lg shadow w-100">GRAVAR</button>
                            <a href="{{ url_for('lista_pombos') }}" class="btn btn-retroceder btn-lg shadow w-100">SAIR
                                (LISTA)</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function verificarCategoria() {
        var dropdown = document.getElementById("categoriaSelect");
        var caixa = document.getElementById("caixaCedidoA");
        var input = document.getElementById("inputCedidoA");

        if (dropdown.value === "Cedido") {
            caixa.style.display = "block";
            setTimeout(function () { input.focus(); }, 10);
        } else {
            caixa.style.display = "none";
            input.value = "";
        }
    }

    function assumirAnilhaSugerida() {
        var anilhaInput = document.getElementById("inputAnilha");
        if (anilhaInput.value.trim() === "" && anilhaInput.placeholder !== "") {
            anilhaInput.value = anilhaInput.placeholder;
        }
        return true;
    }
</script>
{% endblock %}
