{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">Criar Conta</h2>
                    <p class="text-muted">Junta-te ao MyLoft e gere a tua colónia</p>
                </div>
                
                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-start-0" placeholder="ex: joao@email.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="Mínimo 6 caracteres" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirmar Senha</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirm_password" class="form-control bg-light border-start-0" placeholder="Repetir senha" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                        REGISTAR AGORA
                    </button>
                    
                    <div class="text-center">
                        <span class="text-muted">Já tens conta?</span>
                        <a href="{{ url_for('login') }}" class="text-primary fw-bold text-decoration-none ms-1">Entrar aqui</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
