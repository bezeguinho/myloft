{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-5 col-lg-4">
        <div class="card shadow border-0" style="border-radius: 10px;">
            <div class="card-body p-4 p-md-5">
                <h2 class="fw-bold text-primary mb-4 text-center text-uppercase">Criar Conta</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">EMAIL</label>
                        <input type="email" name="email" class="form-control p-3" style="background: #f8f9fa;" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-muted">PASSWORD</label>
                        <div class="input-group">
                            <input type="password" name="password" id="pass1" class="form-control p-3 border-right-none"
                                style="background: #f8f9fa;" required>
                            <span class="input-group-text" onclick="togglePassword('pass1', 'eye1')"><i
                                    class="bi bi-eye-slash" id="eye1"></i></span>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">CONFIRMAR PASSWORD</label>
                        <div class="input-group">
                            <input type="password" name="confirm_password" id="pass2"
                                class="form-control p-3 border-right-none" style="background: #f8f9fa;" required>
                            <span class="input-group-text" onclick="togglePassword('pass2', 'eye2')"><i
                                    class="bi bi-eye-slash" id="eye2"></i></span>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-executar w-100 p-3 mb-3 shadow">CRIAR CONTA</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
