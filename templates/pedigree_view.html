{% extends "base.html" %}
{% block content %}
<div class="container bg-white p-5 shadow" id="printableArea"
    style="min-height: 297mm; border: 1px solid #ddd; border-radius: 10px;">
    <div class="text-center mb-5 border-bottom pb-3">
        <h1 class="fw-bold text-primary text-uppercase">Pedigree Columbófilo</h1>
        <p class="text-muted fw-bold">MYLOFT - GESTÃO DIGITAL</p>
    </div>
    <div class="row mb-5">
        <div class="col-6">
            <h4 class="fw-bold">Pombo: {{ pombo.anilha }}</h4>
            <p><strong>NOME:</strong> {{ pombo.nome or '---' }}</p>
            <p><strong>SEXO:</strong> {{ pombo.sexo }}</p>
        </div>
        <div class="col-6 text-end">
            <h5 class="fw-bold">Proprietário</h5>
            <p>{{ dono.nome if dono else current_user.email }}</p>
        </div>
    </div>
</div>
<div class="mt-5 text-center no-print pb-5">
    <button onclick="window.print();" class="btn btn-executar btn-lg px-5 shadow"><i class="bi bi-printer"></i>
        IMPRIMIR</button>
    <a href="{{ url_for('gerar_pedigree') }}" class="btn btn-retroceder btn-lg px-5 shadow"><i
            class="bi bi-arrow-left"></i> VOLTAR</a>
</div>
{% endblock %}
