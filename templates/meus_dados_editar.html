{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-header bg-primary text-white py-3" style="border-radius: 15px 15px 0 0;">
                <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square me-2"></i>EDITAR OS MEUS DADOS</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Nome do Columbófilo / Pombal</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-primary border-end-0"><i
                                        class="bi bi-person-fill"></i></span>
                                <input type="text" name="nome" class="form-control border-start-0 bg-light"
                                    value="{{ utilizador.nome }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary">Localidade</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-primary border-end-0"><i
                                        class="bi bi-geo-alt-fill"></i></span>
                                <input type="text" name="localidade" class="form-control border-start-0 bg-light"
                                    value="{{ utilizador.localberry }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary">Telefone / Telemóvel</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-primary border-end-0"><i
                                        class="bi bi-telephone-fill"></i></span>
                                <input type="text" name="telefone" class="form-control border-start-0 bg-light"
                                    value="{{ utilizador.telefone }}">
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Email de Contacto</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light text-primary border-end-0"><i
                                        class="bi bi-envelope-at-fill"></i></span>
                                <input type="email" name="email" class="form-control border-start-0 bg-light"
                                    value="{{ utilizador.email }}">
                            </div>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Alterar Foto ou Logotipo</label>
                            <div class="input-group align-items-center">
                                {% if utilizador.foto %}
                                <img src="{{ url_for('static', filename=utilizador.foto) }}" class="me-3 shadow-sm"
                                    style="width: 50px; height: 50px; border-radius: 8px; object-fit: cover;">
                                {% endif %}
                                <input type="file" name="foto" class="form-control bg-light" accept="image/*">
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg flex-grow-1 py-3 fw-bold shadow"
                            style="border-radius: 10px;">
                            ATUALIZAR DADOS
                        </button>
                        <a href="{{ url_for('ver_dados') }}" class="btn btn-outline-secondary btn-lg px-4"
                            style="border-radius: 10px;">CANCELAR</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
