{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card shadow-sm border-0" style="border-radius: 10px; background-color: #ffffff;">
            <div class="card-body p-5">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row align-items-center">

                        <div class="col-md-7 pe-md-5 border-end">
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Nome:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="nome" class="form-control bg-light border-0"
                                        style="height: 45px;" value="{{ utilizador.nome }}" required>
                                </div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Localidade:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="localidade" class="form-control bg-light border-0"
                                        style="height: 45px;" value="{{ utilizador.localberry }}">
                                </div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Email:</label>
                                <div class="col-sm-9">
                                    <input type="email" name="email" class="form-control bg-light border-0"
                                        style="height: 45px;" value="{{ utilizador.email }}">
                                </div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Telemóvel:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="telefone" class="form-control bg-light border-0"
                                        style="height: 45px;" value="{{ utilizador.telefone }}">
                                </div>
                            </div>
                        </div>

                        <div class="col-md-5 text-center">
                            <label class="fw-bold d-block mb-3">Foto / Logotipo</label>
                            <label for="foto-upload" class="d-inline-block position-relative shadow-sm"
                                style="cursor: pointer;">
                                <div class="bg-light d-flex align-items-center justify-content-center"
                                    style="width: 200px; height: 200px; border-radius: 10px; border: 2px solid #0d6efd; overflow: hidden;">
                                    {% if utilizador.foto %}
                                    <img src="{{ url_for('static', filename=utilizador.foto) }}"
                                        style="width: 100%; height: 100%; object-fit: cover;">
                                    {% else %}
                                    <i class="bi bi-person-bounding-box text-primary" style="font-size: 5rem;"></i>
                                    {% endif %}
                                </div>
                                <div class="position-absolute bottom-0 end-0 bg-primary text-white p-2"
                                    style="border-radius: 5px 0 0 0;">
                                    <i class="bi bi-arrow-repeat"></i>
                                </div>
                            </label>
                            <input type="file" id="foto-upload" name="foto" class="d-none" accept="image/*">
                            <small class="text-muted d-block mt-2">Clique na imagem para alterar</small>
                        </div>
                    </div>

                    <div class="mt-5 text-center">
                        <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold shadow-sm custom-btn-hover"
                            style="border-radius: 8px;">
                            ATUALIZAR DADOS
                        </button>
                        <a href="{{ url_for('ver_dados') }}"
                            class="btn btn-link text-secondary d-block mt-2">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-btn-hover:hover {
        background-color: var(--amarelo-myloft) !important;
        border-color: var(--amarelo-myloft) !important;
        color: #000000 !important;
    }
</style>
{% endblock %}
