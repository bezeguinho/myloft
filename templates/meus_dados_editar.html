{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card shadow-sm border-0" style="border-radius: 10px; background-color: #ffffff;">
            <div class="card-body p-5">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row align-items-center">

                        <div class="col-md-4 text-center border-end">
                            <label class="form-label d-block fw-bold mb-3">Foto / Logotipo</label>
                            <div class="mx-auto mb-3 shadow-sm"
                                style="width: 180px; height: 180px; border-radius: 10px; border: 2px solid #0d6efd; overflow: hidden;">
                                {% if utilizador.foto %}
                                <img src="{{ url_for('static', filename=utilizador.foto) }}"
                                    style="width: 100%; height: 100%; object-fit: cover;">
                                {% else %}
                                <div class="w-100 h-100 bg-light d-flex align-items-center justify-content-center">
                                    <i class="bi bi-person-bounding-box text-primary" style="font-size: 4rem;"></i>
                                </div>
                                {% endif %}
                            </div>
                            <input type="file" name="foto" class="form-control form-control-sm" accept="image/*">
                        </div>

                        <div class="col-md-8 ps-md-5">
                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label fw-bold text-end">Nome:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="nome" class="form-control bg-light"
                                        value="{{ utilizador.nome }}" required>
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label fw-bold text-end">Localidade:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="localidade" class="form-control bg-light"
                                        value="{{ utilizador.localberry }}">
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label fw-bold text-end">Email:</label>
                                <div class="col-sm-9">
                                    <input type="email" name="email" class="form-control bg-light"
                                        value="{{ utilizador.email }}">
                                </div>
                            </div>
                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label fw-bold text-end">Telemóvel:</label>
                                <div class="col-sm-9">
                                    <input type="text" name="telefone" class="form-control bg-light"
                                        value="{{ utilizador.telefone }}">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 text-center">
                        <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold shadow-sm"
                            style="border-radius: 8px;">
                            ATUALIZAR DADOS
                        </button>
                        <a href="{{ url_for('ver_dados') }}"
                            class="btn btn-link text-secondary mt-2 d-block">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
