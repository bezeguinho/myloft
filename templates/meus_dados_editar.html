{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card shadow-sm border-0" style="border-radius: 10px;">
            <div class="card-body p-5">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row align-items-center">
                        <div class="col-md-7 pe-md-5 border-end">
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Nome:</label>
                                <div class="col-sm-9"><input type="text" name="nome" class="form-control bg-light"
                                        value="{{ utilizador.nome }}" required></div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Localidade:</label>
                                <div class="col-sm-9"><input type="text" name="localidade" class="form-control bg-light"
                                        value="{{ utilizador.localidade or '' }}"></div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Email:</label>
                                <div class="col-sm-9"><input type="email" name="email" class="form-control bg-light"
                                        value="{{ utilizador.email or current_user.email }}"></div>
                            </div>
                            <div class="mb-4 row">
                                <label class="col-sm-3 col-form-label fw-bold">Telemóvel:</label>
                                <div class="col-sm-9"><input type="text" name="telefone" class="form-control bg-light"
                                        value="{{ utilizador.telefone }}"></div>
                            </div>
                        </div>
                        <div class="col-md-5 text-center">
                            <label for="foto-upload" style="cursor: pointer;">
                                <div class="bg-light d-flex align-items-center justify-content-center shadow-sm"
                                    style="width: 200px; height: 200px; border-radius: 10px; border: 2px dashed var(--azul-myloft); overflow: hidden;">
                                    {% if utilizador.foto %}<img src="{{ url_for('static', filename=utilizador.foto) }}"
                                        style="width: 100%; height: 100%; object-fit: cover;">
                                    {% else %}<i class="bi bi-person-bounding-box text-primary"
                                        style="font-size: 5rem;"></i>{% endif %}
                                </div>
                            </label>
                            <input type="file" id="foto-upload" name="foto" class="d-none" accept="image/*">
                            <small class="text-muted d-block mt-2">Clique para selecionar foto</small>
                        </div>
                    </div>

                    <div class="mt-5 d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-executar btn-lg px-5 shadow">ATUALIZAR DADOS</button>
                        <a href="{{ url_for('ver_dados') }}" class="btn btn-retroceder btn-lg px-5 shadow">
                            <i class="bi bi-arrow-left"></i> CANCELAR
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
