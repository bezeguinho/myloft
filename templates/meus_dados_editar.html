{% extends "base.html" %}

{% block content %}
<style>
    .btn-voltar {
        background-color: #ffcc29 !important;
        color: #333 !important;
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: bold;
        transition: 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
    }
    .btn-voltar:hover { background-color: #e6b800 !important; }

    .btn-gravar {
        background-color: #0056d2 !important;
        color: white !important;
        border: none;
        border-radius: 12px;
        padding: 10px 24px;
        font-weight: bold;
        transition: 0.3s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
    }
    .btn-gravar:hover { background-color: #0044a8 !important; }

    .card-editar {
        border-radius: 15px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .form-label-top {
        font-weight: bold;
        color: #555;
        text-transform: uppercase;
        font-size: 0.85rem;
        margin-bottom: 8px;
        display: block;
    }

    .input-custom {
        border: 1px solid #ddd !important;
        border-radius: 8px !important;
        padding: 12px !important;
        background-color: #fdfdfd !important;
    }
    .input-custom:focus {
        border-color: #0056d2 !important;
        box-shadow: 0 0 0 0.25rem rgba(0, 86, 210, 0.1) !important;
    }

    .foto-placeholder {
        width: 200px;
        height: 200px;
        border-radius: 15px;
        border: 2px dashed #0056d2;
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        cursor: pointer;
        transition: 0.3s;
    }
    .foto-placeholder:hover {
        background-color: #eef4ff;
        border-color: #0044a8;
    }
</style>

<!-- Topo: Título e Botão Voltar -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold text-primary m-0">EDITAR PERFIL</h2>
    <a href="{{ url_for('ver_dados') }}" class="btn-voltar shadow-sm">
        <i class="bi bi-arrow-left me-2"></i> Voltar
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-12 col-xl-10">
        <div class="card card-editar p-4 p-md-5">
            <form method="POST" enctype="multipart/form-data">
                <div class="row g-5">
                    <!-- Coluna Foto -->
                    <div class="col-12 col-md-4 text-center d-flex flex-column align-items-center justify-content-center border-end">
                        <label for="foto-upload" class="foto-placeholder shadow-sm mb-3">
                            {% if utilizador.foto %}
                            <img src="{{ url_for('static', filename=utilizador.foto) }}" style="width: 100%; height: 100%; object-fit: cover;">
                            {% else %}
                            <i class="bi bi-person-bounding-box text-primary" style="font-size: 60px;"></i>
                            {% endif %}
                        </label>
                        <input type="file" id="foto-upload" name="foto" class="d-none" accept="image/*" onchange="previewImage(this)">
                        <label for="foto-upload" class="btn btn-sm btn-outline-primary px-3 fw-bold" style="border-radius: 8px;">
                            SELECIONAR FOTO
                        </label>
                        <small class="text-muted d-block mt-2">Clique no quadrado ou no botão para alterar.</small>
                    </div>

                    <!-- Coluna Campos -->
                    <div class="col-12 col-md-8">
                        <div class="row g-4">
                            <div class="col-12 col-md-6">
                                <label class="form-label-top">Nome</label>
                                <input type="text" name="nome" class="form-control input-custom" value="{{ utilizador.nome }}" required>
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label-top">Localidade</label>
                                <input type="text" name="localidade" class="form-control input-custom" value="{{ utilizador.localidade or '' }}">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label-top">Telefone</label>
                                <input type="text" name="telefone" class="form-control input-custom" value="{{ utilizador.telefone or '' }}">
                            </div>
                            <div class="col-12 col-md-6">
                                <label class="form-label-top">E-mail</label>
                                <input type="email" name="email" class="form-control input-custom" value="{{ utilizador.email or current_user.email }}">
                            </div>
                        </div>

                        <div class="mt-5 d-flex justify-content-start">
                            <button type="submit" class="btn-gravar shadow-sm">
                                <i class="bi bi-check-circle me-2"></i> Gravar Dados
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function previewImage(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = document.querySelector('.foto-placeholder img');
                if (!img) {
                    img = document.createElement('img');
                    img.style.width = '100%';
                    img.style.height = '100%';
                    img.style.objectFit = 'cover';
                    document.querySelector('.foto-placeholder').innerHTML = '';
                    document.querySelector('.foto-placeholder').appendChild(img);
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
{% endblock %}
