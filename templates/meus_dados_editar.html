{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0" style="border-radius: 15px;">
            <div class="card-header bg-primary text-white py-3" style="border-radius: 15px 15px 0 0;">
                <h4 class="mb-0 fw-bold">
                    <i class="bi bi-pencil-square me-2"></i>EDITAR OS MEUS DADOS
                </h4>
            </div>

            <div class="card-body p-4">
                <form method="POST" enctype="multipart/form-data">
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Nome do Columbófilo / Pombal</label>
                            <input type="text" name="nome" class="form-control form-control-lg"
                                value="{{ utilizador.nome }}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary">Localidade</label>
                            <input type="text" name="localidade" class="form-control"
                                value="{{ utilizador.localberry }}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary">Telefone / Telemóvel</label>
                            <input type="text" name="telefone" class="form-control" value="{{ utilizador.telefone }}">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Email de Contacto</label>
                            <input type="email" name="email" class="form-control" value="{{ utilizador.email }}">
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold text-secondary">Alterar Foto de Perfil ou Logotipo</label>
                            <div class="d-flex align-items-center gap-3">
                                {% if utilizador.foto %}
                                <img src="{{ url_for('static', filename=utilizador.foto) }}"
                                    style="width: 70px; height: 70px; object-fit: cover; border-radius: 10px;"
                                    class="shadow-sm">
                                {% endif %}
                                <input type="file" name="foto" class="form-control" accept="image/*">
                            </div>
                            <small class="text-muted mt-2 d-block">Deixe vazio se não pretender alterar a imagem
                                atual.</small>
                        </div>
                    </div>

                    <div class="mt-5 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg px-5 fw-bold shadow">
                            ATUALIZAR DADOS
                        </button>
                        <a href="{{ url_for('ver_dados') }}" class="btn btn-outline-secondary btn-lg px-4">
                            CANCELAR
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
