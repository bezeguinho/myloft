{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm border-0" style="border-radius: 10px;">
    <div class="card-header bg-primary text-white py-3">
        <h4 class="mb-0 fw-bold">{{ titulo }}</h4>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Anilha</th>
                        <th>Nome</th>
                        <th>Ano</th>
                        <th>Sexo</th>
                        <th>Cor</th>
                        <th>Categoria</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in pombos %}
                    <tr>
                        <td class="fw-bold">{{ p.anilha }}</td>
                        <td>{{ p.nome or '---' }}</td>
                        <td>{{ p.ano }}</td>
                        <td>{{ p.sexo }}</td>
                        <td>{{ p.cor or '---' }}</td>
                        <td>{{ p.categoria }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">Nenhum pombo encontrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="mt-4">
            <a href="{{ url_for('index') }}" class="btn btn-retroceder shadow">
                <i class="bi bi-arrow-left"></i> VOLTAR
            </a>
        </div>
    </div>
</div>
{% endblock %}
