{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                        <i class="bi bi-key fs-1"></i>
                    </div>
                    <h2 class="fw-bold text-dark">Recuperar Senha</h2>
                    <p class="text-muted">Insere o teu email e enviar-te-emos as instruções para redefinires a tua palavra-passe.</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Email associado à conta</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control bg-light border-start-0" placeholder="exemplo@email.com" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow-sm mb-3">
                        <i class="bi bi-send me-2"></i> ENVIAR INSTRUÇÕES
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="{{ url_for('login') }}" class="text-decoration-none text-muted fw-semibold">
                            <i class="bi bi-arrow-left me-1"></i> Voltar ao Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
