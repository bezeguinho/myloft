<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYLOFT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --azul-myloft: #0d6efd;
      --amarelo-myloft: #ffc107;
    }

    body {
      background-color: #f8f9fa;
    }

    .navbar {
      background-color: var(--azul-myloft) !important;
      padding: 0.8rem 1rem;
    }

    .navbar-brand {
      color: #ffffff !important;
      font-weight: bold;
      text-transform: uppercase;
    }

    .nav-link {
      color: #ffffff !important;
      font-weight: bold;
      text-transform: uppercase;
      margin: 0 5px;
    }

    .nav-link:hover {
      background-color: var(--amarelo-myloft);
      color: #000000 !important;
      border-radius: 5px;
    }

    /* BOTÕES: BRANCO -> PRETO NO HOVER */
    .btn-executar {
      background-color: var(--azul-myloft) !important;
      color: #ffffff !important;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      padding: 12px 25px;
      transition: 0.3s;
    }

    .btn-executar:hover {
      color: #000000 !important;
    }

    .btn-retroceder {
      background-color: var(--amarelo-myloft) !important;
      color: #ffffff !important;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      padding: 12px 25px;
      transition: 0.3s;
    }

    .btn-retroceder:hover {
      color: #000000 !important;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg mb-5 shadow">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">MYLOFT</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          {% if current_user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="{{ url_for('novo_pombo') }}">INSERIR POMBO</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('lista_pombos') }}">MEU POMBAL</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('gerar_pedigree') }}">PEDIGREE</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('ver_dados') }}">OS MEUS DADOS</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">SAIR</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
  <div class="container">{% block content %}{% endblock %}</div>
</body>

</html>
