<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYLOFT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --azul-myloft: #0d6efd;
      --amarelo-myloft: #ffc107;
    }

    body {
      background-color: #f8f9fa;
    }

    .navbar {
      background-color: var(--azul-myloft) !important;
      padding: 0.8rem 1rem;
    }

    .navbar-brand {
      color: #ffffff !important;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1.6rem;
      text-decoration: none;
    }

    /* --- ESTILO DOS BOTÕES (PADRÃO MYLOFT) --- */
    .btn-executar {
      background-color: var(--azul-myloft) !important;
      color: #ffffff !important;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      transition: 0.3s;
      padding: 10px 24px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    /* Letras PRETAS no hover do azul */
    .btn-executar:hover {
      color: #000000 !important;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .btn-retroceder {
      background-color: var(--amarelo-myloft) !important;
      color: #000000 !important;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      transition: 0.3s;
      padding: 10px 24px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    /* Letras BRANCAS no hover do amarelo */
    .btn-retroceder:hover {
      color: #ffffff !important;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .nav-link {
      color: #ffffff !important;
      font-weight: bold;
      margin: 0 10px;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <nav class="navbar mb-5 shadow">
    <div class="container-fluid d-flex justify-content-between">
      <a class="navbar-brand" href="/">MYLOFT</a>
      <div>
        {% if current_user.is_authenticated %}
        <a class="nav-link d-inline" href="/logout">SAIR</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
