<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MYLOFT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --azul-myloft: #0d6efd;
      --amarelo-myloft: #ffc107;
    }

    body {
      background-color: #f8f9fa;
    }

    .navbar {
      background-color: var(--azul-myloft) !important;
      padding: 0.8rem 1rem;
    }

    .navbar-brand {
      color: #ffffff !important;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 1.5rem;
    }

    @media (min-width: 992px) {
      .nav-item.dropdown:hover .dropdown-menu {
        display: block;
        margin-top: 0;
      }
    }

    .nav-link {
      color: #ffffff !important;
      font-weight: bold;
      text-transform: uppercase;
      padding: 8px 15px !important;
      transition: 0.2s;
    }

    .nav-link:hover,
    .dropdown-item:hover {
      background-color: var(--amarelo-myloft) !important;
      color: #000000 !important;
      border-radius: 6px;
    }

    .dropdown-menu {
      background-color: var(--azul-myloft) !important;
      border: none;
      border-radius: 8px;
      padding: 10px;
      shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }

    .dropdown-item {
      color: #ffffff !important;
      font-weight: bold;
      padding: 8px 15px;
      text-transform: uppercase;
    }

    /* BOTÕES: BRANCO -> PRETO NO HOVER */
    .btn-executar {
      background-color: var(--azul-myloft) !important;
      color: #ffffff !important;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      transition: 0.3s;
      padding: 10px 20px;
    }

    .btn-executar:hover {
      color: #000000 !important;
    }

    .btn-retroceder {
      background-color: var(--amarelo-myloft) !important;
      color: #ffffff !important;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      transition: 0.3s;
      padding: 10px 20px;
    }

    .btn-retroceder:hover {
      color: #000000 !important;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg mb-5 shadow">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="{{ url_for('index') }}">MYLOFT</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center">
          {% if current_user.is_authenticated %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="menuPombos">GESTÃO DE POMBOS</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="{{ url_for('novo_pombo') }}">INSERIR POMBO</a></li>
              <li>
                <hr class="dropdown-divider border-white">
              </li>
              <li><a class="dropdown-item" href="{{ url_for('lista_pombos') }}">TODOS OS POMBOS</a></li>
              <li><a class="dropdown-item" href="{{ url_for('reprodutores') }}">REPRODUTORES</a></li>
              <li><a class="dropdown-item" href="{{ url_for('voadores') }}">VOADORES</a></li>
              <li><a class="dropdown-item" href="{{ url_for('cedidos') }}">CEDIDOS</a></li>
              <li><a class="dropdown-item" href="{{ url_for('pombos_ocultos') }}">POMBOS OCULTOS</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('gerar_pedigree') }}">PEDIGREE</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('ver_dados') }}">OS MEUS DADOS</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">SAIR</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
  <div class="container">{% block content %}{% endblock %}</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
