<!doctype html>
<html lang="pt">

<head>
  <meta charset="utf-8">
  <title>MYLOFT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --amarelo-myloft: #ffde00;
      --azul-myloft: #0d6efd;
    }

    /* CONFIGURAÇÃO GERAL DOS BOTÕES */
    .btn {
      border-radius: 8px !important;
      font-weight: bold !important;
      transition: all 0.2s ease;
      border: none !important;
      padding: 10px 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* BOTÃO EXECUTAR (AZUL) */
    .btn-executar,
    .btn-primary {
      background-color: var(--azul-myloft) !important;
      color: #ffffff !important;
    }

    .btn-executar:hover,
    .btn-primary:hover {
      background-color: var(--azul-myloft) !important;
      color: #000000 !important;
    }

    /* BOTÃO RETROCEDER / VOLTAR / CANCELAR (AMARELO) - NOVA REGRA */
    .btn-retroceder,
    .btn-warning {
      background-color: var(--amarelo-myloft) !important;
      color: #000000 !important;
      /* Letras Pretas no Padrão */
    }

    .btn-retroceder:hover,
    .btn-warning:hover {
      background-color: var(--amarelo-myloft) !important;
      color: #ffffff !important;
      /* Letras Brancas no Hover */
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* MENUS HOVER */
    .navbar-nav .nav-link {
      color: #ffffff !important;
      border-radius: 8px !important;
    }

    .navbar-nav .nav-link:hover,
    .dropdown-item:hover {
      background-color: var(--amarelo-myloft) !important;
      color: #000000 !important;
    }

    .nav-item.dropdown:hover .dropdown-menu {
      display: block;
      margin-top: 0;
    }

    body {
      background-color: #e9f1f7;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">MYLOFT</a>
      {% if current_user.is_authenticated %}
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#">GESTÃO DE POMBOS</a>
            <ul class="dropdown-menu border-0 shadow">
              <li><a class="dropdown-item" href="{{ url_for('novo_pombo') }}">INSERIR POMBO</a></li>
              <li>
                <hr class="dropdown-divider">
              </li>
              <li><a class="dropdown-item" href="{{ url_for('lista_pombos') }}">TODOS OS POMBOS</a></li>
              <li><a class="dropdown-item" href="{{ url_for('reprodutores') }}">REPRODUTORES</a></li>
              <li><a class="dropdown-item" href="{{ url_for('voadores') }}">VOADORES</a></li>
              <li><a class="dropdown-item" href="{{ url_for('cedidos') }}">CEDIDOS</a></li>
            </ul>
          </li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('gerar_pedigree') }}">PEDIGREE</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('ver_dados') }}">OS MEUS DADOS</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">SAIR</a></li>
        </ul>
      </div>
      {% endif %}
    </div>
  </nav>
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
